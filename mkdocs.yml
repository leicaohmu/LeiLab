        - io: codelib/histox/io.md
        - tfrecord: codelib/histox/tfrecord.md
      - 模型与训练:
        - model: codelib/histox/model.md
        - mil: codelib/histox/mil.md
      - 图像分析:
        - slide: codelib/histox/slide.md
        - segment: codelib/histox/segment.md
        - cellseg: codelib/histox/cellseg.md
        - heatmap: codelib/histox/heatmap.md
        - mosaic: codelib/histox/mosaic.md
      - 统计与工具:
        - stats: codelib/histox/stats.md
        - norm: codelib/histox/norm.md
        - util: codelib/histox/util.md
      - 项目管理:
        - project: codelib/histox/project.md
        - project_utils: codelib/histox/project_utils.md
        - sample_actions: codelib/histox/sample_actions.md
      - 其他:
