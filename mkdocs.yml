# Project information
site_name: Lei-Lab Knowledge Platform
site_url: https://leilabnew-b35ga019n.maozi.io/
site_author: Lei-Lab Team
site_description: >-
  课题组知识共享平台，涵盖生物统计、线性代数等课程、
  代码库文档、文献抄读、知识博客与课题组成员介绍。

# Repository
repo_name: leicaohmu/LeiLab
repo_url: https://github.com/leicaohmu/LeiLab

# Copyright
copyright: Copyright &copy; 2024 - 2025 Lei-Lab Team. All rights reserved.

# ============================================================
# Theme
# ============================================================
theme:
  name: material
  language: zh
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  custom_dir: overrides
  features:
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    # - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/toggle-switch
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/toggle-switch-off
        name: 跟随系统设置
  font:
    text: Roboto
    code: Roboto Mono
# ============================================================
# Plugins
# ============================================================
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: false
            preload_modules: []
          
  - minify:
      minify_html: true
  - tags

# ============================================================
# Extra
# ============================================================
extra:
  status:
    new: 最近新增
    deprecated: 已废弃
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/leicaohmu/LeiLab
      name: GitHub

# ============================================================
# Markdown Extensions
# ============================================================
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ============================================================
# Extra files
# ============================================================
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

# ============================================================
# Navigation
# ============================================================
